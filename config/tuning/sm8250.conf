# config/tuning/sm8250.conf — per-SoC userspace compiler tuning. POSIX sh,
# sourced by scripts/lib.sh right after kernel/${SOC}/kernel.conf; consumed by
# build-packages.sh, which passes the values into makepkg's environment for the
# tuned PKGBUILDs (mesa, gamescope, mangohud, fex-emu).
#
# ROCKNIX's exact SM8250 userspace flags (devices/SM8250/options:
# TARGET_CPU=cortex-a76.cortex-a55, TARGET_CPU_FLAGS=+crypto+crc+fp+simd,
# composed by config/arch.aarch64 into -march=armv8.2-a... -mtune=..., plus
# their unconditional -mno-outline-atomics). The Snapdragon 865 is 4x A77 +
# 4x A55 (armv8.2, no SVE/armv9); gcc has no a77.a55 big.LITTLE tune pair, so
# ROCKNIX (and we) use the adjacent a76.a55 pair.
: "${POCKNIX_TUNE_CFLAGS:=-march=armv8.2-a+crypto+crc+fp+simd -mtune=cortex-a76.cortex-a55 -mno-outline-atomics}"

# FEX engine tuning. ROCKNIX's fex-emu package.mk derives TUNE_CPU from the
# last component of the big.LITTLE pair (TUNE_CPU="${TARGET_CPU##*.}") ->
# cortex-a55 on SM8250: FEX worker threads also land on the littles, and the
# JIT output is runtime-tuned to the real CPU regardless, so the engine is
# tuned for the weakest core it runs on (same reasoning as the sm8550
# cortex-a78 remap, one step further down).
: "${POCKNIX_FEX_TUNE_CPU:=cortex-a55}"
