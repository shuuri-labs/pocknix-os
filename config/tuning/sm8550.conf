# config/tuning/sm8550.conf — per-SoC userspace compiler tuning. POSIX sh,
# sourced by scripts/lib.sh right after kernel/${SOC}/kernel.conf; consumed by
# build-packages.sh, which passes the values into makepkg's environment for the
# tuned PKGBUILDs (mesa, gamescope, mangohud, fex-emu).
#
# ROCKNIX's exact SM8550 userspace flags (devices/SM8550/options:
# TARGET_CPU=cortex-x3, TARGET_CPU_FLAGS=+fp16+crypto+i8mm+bf16+memtag+sm4+sha3
# +nosve+nosve2, composed by config/arch.aarch64 into -march/-mtune, plus their
# unconditional -mno-outline-atomics).
: "${POCKNIX_TUNE_CFLAGS:=-march=armv9-a+fp16+crypto+i8mm+bf16+memtag+sm4+sha3+nosve+nosve2 -mtune=cortex-x3 -mno-outline-atomics}"

# FEX engine tuning. ROCKNIX deliberately remaps the SM8550 TARGET_CPU
# (cortex-x3) DOWN to cortex-a78 for the FEX build (fex-emu package.mk:
# case cortex-x3|cortex-x4 -> TUNE_CPU=cortex-a78): the JIT output is
# runtime-tuned to the real CPU regardless, so tuning the engine to the
# armv9 prime buys nothing and risks armv9 host-tool SIGILLs.
: "${POCKNIX_FEX_TUNE_CPU:=cortex-a78}"
