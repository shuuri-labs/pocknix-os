# pocknix-os build configuration
#
# Central settings sourced by every script in scripts/. Override any value by
# exporting it in your shell before invoking make, e.g.:
#
#   export DISTRIBUTION_DIR=/path/to/distribution
#   make build
#
# This file must stay POSIX-sh compatible (it is sourced, not executed).

# ---------------------------------------------------------------------------
# Image target — a key into devices/<name>/profile.conf, which lib.sh sources
# right after this file. Everything target-specific (SoC, partition labels,
# kernel cmdline, firmware source, device packages) lives in the profile;
# this file holds only target-NEUTRAL build settings.
#   make build DEVICE=rp6      (or export DEVICE before invoking make)
# DEVICE names an IMAGE TARGET: the sm8550 devices still have one target each
# (rp6, odin2, ...); new SoCs get ONE family target per SoC (sm8250) whose BSP
# selects the board at runtime by devicetree model. The sm8550 targets will
# collapse to a family target the same way later.
# ---------------------------------------------------------------------------
: "${DEVICE:=rp6}"            # Retroid Pocket 6 (see devices/)

# ---------------------------------------------------------------------------
# Layout (absolute paths derived from POCKNIX_ROOT, set by lib.sh)
# NB: KERNEL_DIR is derived in lib.sh as kernel/${SOC} once the profile has
# set the SoC.
# ---------------------------------------------------------------------------
: "${BUILD_DIR:=${POCKNIX_ROOT}/build}"
: "${ROOTFS_DIR:=${BUILD_DIR}/rootfs}"
: "${IMAGE_DIR:=${BUILD_DIR}/image}"
: "${VENDOR_DIR:=${POCKNIX_ROOT}/vendor}"
: "${CONFIG_DIR:=${POCKNIX_ROOT}/config}"
: "${PACKAGES_DIR:=${POCKNIX_ROOT}/packages}"
: "${CACHE_DIR:=${BUILD_DIR}/cache}"

# ---------------------------------------------------------------------------
# Arch Linux ARM base rootfs
# ALARM publishes a rolling "latest" tarball. For a hermetic/reproducible build
# set POCKNIX_ALARM_SHA256 to the digest of the tarball you intend to pin.
# Leave it empty to build against whatever "latest" currently is (a warning is
# printed and verification is skipped).
# ---------------------------------------------------------------------------
: "${ALARM_MIRROR:=http://os.archlinuxarm.org/os}"
: "${ALARM_TARBALL:=ArchLinuxARM-aarch64-latest.tar.gz}"
: "${POCKNIX_ALARM_SHA256:=}"

# ---------------------------------------------------------------------------
# Kernel source pins live per-SoC in kernel/<soc>/kernel.conf (sourced by
# lib.sh after the device profile). The cmdline + partition labels are device
# facts and live in devices/<name>/profile.conf.
# ---------------------------------------------------------------------------

# mkbootimg (Google) — builds the qcom-abl Android boot image. Pinned to the
# commit ROCKNIX uses (packages/tools/mkbootimg).
: "${MKBOOTIMG_URL:=https://android.googlesource.com/platform/system/tools/mkbootimg}"
: "${MKBOOTIMG_COMMIT:=d2bb0af5ba6d3198a3e99529c97eda1be0b5a093}"

# Parallelism for the kernel compile
: "${JOBS:=}"

# ---------------------------------------------------------------------------
# SD boot-test image (build-sd-image.sh) — device-neutral knobs. The partition
# names/labels the device's bootloader expects come from the device profile.
# ---------------------------------------------------------------------------
: "${SD_BOOT_MIB:=256}"             # size of the FAT boot partition
: "${SD_SLACK_MIB:=1024}"           # free space added to the root partition beyond the rootfs
: "${SD_ROOT_PASSWORD:=pocknix}"    # root password baked into the test image (CHANGE for real use)
# Optional Wi-Fi pre-seed: if set, the image auto-joins this network on boot so you
# can SSH over Wi-Fi (no USB cable). Pass at build time, e.g.:
#   sudo SD_WIFI_SSID='MyNet' SD_WIFI_PSK='secret' make sd-image
: "${SD_WIFI_SSID:=}"
: "${SD_WIFI_PSK:=}"
# Wi-Fi regulatory country (2-letter ISO code, e.g. GB/US/DE). REQUIRED for 5 GHz:
# regulatory.db only provides the rules; the domain must be SET or the kernel stays on
# the restrictive world domain (5 GHz channels become no-IR -> can't associate).
: "${SD_WIFI_COUNTRY:=}"

# ---------------------------------------------------------------------------
# Published [pocknix] pacman repo (incremental updates: device runs pacman -Syu
# instead of reflashing). All optional — with POCKNIX_REPO_URL unset the image
# ships with no [pocknix] stanza (reflash-only, the pre-repo behavior).
#   POCKNIX_REPO_URL           BASE url; devices fetch from <base>/<soc>, e.g.
#                              https://repo.example.com/aarch64 -> .../aarch64/sm8550
#                              (or http://<vm-ip>:8000 for LAN testing). Per-SoC
#                              trees because tuned packages (mesa, gamescope, ...)
#                              share pkgnames across SoCs with different binaries.
#   POCKNIX_REPO_SIGLEVEL      pacman SigLevel for the stanza; use
#                              "Optional TrustAll" for unsigned LAN testing
#   POCKNIX_REPO_GPG_KEY       key id/email publish-repo.sh signs with (empty = unsigned)
#   POCKNIX_REPO_PUBKEY        path to the exported public key; baked into the image
#                              + lsigned so devices trust the repo out of the box
#   POCKNIX_REPO_RCLONE_REMOTE rclone destination, e.g. r2:pocknix-repo/aarch64
# See docs/pacman-repo.md for the full setup story.
# ---------------------------------------------------------------------------
: "${POCKNIX_REPO_URL:=}"
: "${POCKNIX_REPO_SIGLEVEL:=Required DatabaseOptional}"
: "${POCKNIX_REPO_GPG_KEY:=}"
: "${POCKNIX_REPO_PUBKEY:=}"
: "${POCKNIX_REPO_RCLONE_REMOTE:=}"

# ---------------------------------------------------------------------------
# Source of the ROCKNIX kernel + device integration to vendor (make sync).
# Defaults to the user's local distribution checkout; override DISTRIBUTION_DIR
# as needed. The per-SoC device dir (ROCKNIX_DEVICE_DIR) is derived in lib.sh
# from ROCKNIX_SOC (set in kernel/<soc>/kernel.conf).
# ---------------------------------------------------------------------------
: "${DISTRIBUTION_DIR:=${POCKNIX_ROOT}/../distribution}"
: "${ROCKNIX_PROJECT_DIR:=${DISTRIBUTION_DIR}/projects/ROCKNIX}"

# ---------------------------------------------------------------------------
# Cross-build / chroot helpers
# When building on an x86_64 host, package installation runs the aarch64 pacman
# under qemu-user-static via binfmt_misc.
# ---------------------------------------------------------------------------
: "${QEMU_AARCH64_STATIC:=/usr/bin/qemu-aarch64-static}"
