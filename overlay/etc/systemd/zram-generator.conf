# pocknix — compressed-RAM swap (zram-generator). Gives the RAM-limited RP6 headroom for big
# games + Waydroid + in-game Steam downloads without touching flash (zram lives in RAM; zstd
# compresses ~2-3x, so `ram`-sized zram is effectively a large elastic swap). armada/SteamOS/
# ROCKNIX all run zram; the kernel ships ZRAM=m with the zstd backend (kernel/config).
#
# zram-generator creates /dev/zram0 + a swap unit at boot from this file. Paired tunables live in
# overlay/usr/lib/sysctl.d/60-pocknix-gaming.conf: vm.swappiness=180 (swap aggressively TO zram,
# since it's RAM-fast, before reclaiming file cache the game is actively using).
[zram0]
# = total RAM. Scales across the 8/12 GB RP6 variants; with zstd the real backing cost is a
# fraction of this (only compressed dirty pages occupy RAM). SteamOS uses ~1x RAM likewise.
zram-size = ram
compression-algorithm = zstd
# Keep zram ahead of any (nonexistent) disk swap in the reclaim order.
swap-priority = 100
# zram pages must never themselves be written back to a (nonexistent) disk swap.
fs-type = swap
