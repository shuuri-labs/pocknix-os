# Deck-aligned limits for the non-root 'deck' session (SteamOS model; memlock matches armada).
#
# NO rtprio grant — DELIBERATE. Wine/Proton keys its realtime path off RLIMIT_RTPRIO: a blanket
# grant makes it promote every "time critical" game thread (~70 in ASBR) to SCHED_RR, and with
# the RT throttle off (usr/lib/sysctl.d/60-pocknix-gaming.conf) those caused the priority-
# inversion "GPU->0%" hitching (docs/gamescope-fps-investigation.md). With rtprio 0 Wine
# degrades the request to nice values and the game runs SCHED_OTHER — exactly like real
# SteamOS, armada (no rtprio grant either) and ROCKNIX (game measured OTHER there). This also
# made the old pocknix-rt-demote watcher band-aid unnecessary (both removed 2026-07-03).
#
# Realtime is granted SURGICALLY instead, never session-wide:
#   - gamescope: SCHED_RR via the root pocknix-gamescope-rt helper (enabled in
#     build-sd-image.sh). gamescope checks RLIMIT_RTPRIO in userspace before attempting RT,
#     so with rtprio 0 it can't self-promote even though it holds CAP_SYS_NICE — the external
#     helper is the mechanism, mirroring ROCKNIX's root session.
#   - audio: PipeWire/WirePlumber via rtkit (bounded, watchdogged RT — the SteamOS path).
#     rtkit is in base.list; without the rtprio grant PipeWire's module-rt falls back to it.
#
# nice:    allow negative nice (gamescope/Proton bump a few threads; Wine's non-RT fallback).
# memlock: Proton/pressure-vessel + GPU buffer pinning + some anti-cheat want it unlimited (armada).
#
# Applied via pam_limits at the deck tty autologin (login -> PAM). `ulimit -r` in the deck
# session must show 0; if a session still shows 98 it predates this change — re-login/reboot.
deck    -    nice       -20
deck    -    memlock    unlimited
