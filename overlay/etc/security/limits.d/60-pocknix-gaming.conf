# Deck-aligned RT/memory limits for the non-root 'deck' session (matches the Steam Deck + armada).
#
# rtprio: gamescope has CAP_SYS_NICE (built -Drt_cap) but on our non-root session it still only
#   SCHED_BATCHes its background threads and never RRs the compositor — because it checks
#   RLIMIT_RTPRIO before attempting realtime, and the default soft limit (0) makes it skip RT even
#   though the cap would allow it. Raising it lets gamescope self-promote -> the pocknix-gamescope-rt
#   root helper should become redundant (verify with `ulimit -r` = 98 in the deck session).
# nice:  allow negative nice (gamescope/Proton bump a few threads).
# memlock: Proton/pressure-vessel + GPU buffer pinning + some anti-cheat want it unlimited (armada).
#
# Applied via pam_limits at the deck tty autologin (login -> PAM). If `ulimit -r` shows 0 in-session,
# the login PAM stack is missing pam_limits and we'd set DefaultLimitRTPRIO via systemd instead.
deck    -    rtprio     98
deck    -    nice       -20
deck    -    memlock    unlimited
