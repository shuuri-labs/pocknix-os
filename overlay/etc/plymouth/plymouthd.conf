# pocknix-os — plymouth boot splash config.
# spinner = the stock minimal theme (spinning dial + the Arch watermark for now; a Pocknix
# watermark needs a custom theme dir so package upgrades can't undo it — planned, blocked on a
# proper logo; see progress.md). ShowDelay=0: with no initramfs the splash already starts "late"
# (sysinit, ~2.5s); don't add the default 5s hide-short-boots delay on top or it would never show.
# DeviceTimeout caps how long plymouthd waits for the DRM device before falling back, so a display
# problem can't wedge boot.
[Daemon]
Theme=spinner
ShowDelay=0
DeviceTimeout=8
DeviceScale=2
