# pocknix gaming/compositor responsiveness tuning — ported from armada (60-armada-gaming.conf).
# Targets the gamescope-SESSION symptoms that desktop/kwin mode does NOT exhibit: in-game
# choppiness and system-wide unresponsiveness under load (esp. in-game Steam downloads).

# RT throttle OFF — the key gamescope-vs-desktop differentiator. gamescope's compositor threads
# run SCHED_RR (via pocknix-gamescope-rt, matching ROCKNIX). The kernel default caps RT at 95%/
# period (sched_rt_runtime_us=950000); under heavy load (a download saturating the cores) those
# RR threads hit the cap and get THROTTLED -> the compositor stalls -> visible choppiness. Desktop
# mode has no RT threads, so it's immune — which is exactly the asymmetry we saw. -1 = no throttle
# (armada/SteamOS run this way; gamescope's RR threads sleep on vblank, so no runaway risk).
kernel.sched_rt_runtime_us=-1

# Cap dirty pages so a fast download's writes flush STEADILY instead of accumulating to the default
# ~dirty_ratio (20% of RAM, ~1.5 GB) and then flushing in one system-stalling burst. 256 MiB / 64 MiB.
vm.dirty_bytes=268435456
vm.dirty_background_bytes=67108864
vm.page-cluster=0

# Smoother memory reclaim under pressure (less frame-pacing disruption from kswapd).
vm.watermark_boost_factor=0
vm.watermark_scale_factor=125

# Watchdogs add per-CPU timer jitter; off for lower scheduling latency (matches armada/SteamOS).
kernel.nmi_watchdog=0
kernel.soft_watchdog=0
kernel.watchdog=0

# NB: armada also sets vm.swappiness=180 — DELIBERATELY OMITTED here because pocknix has no zram;
# 180 only makes sense paired with compressed RAM swap (else it just thrashes disk). Revisit if/when
# zram is added.
