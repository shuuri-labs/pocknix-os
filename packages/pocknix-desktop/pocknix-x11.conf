# Create /tmp/.X11-unix so kwin_wayland can bring up XWayland for X11 apps (e.g. the native ARM
# Steam client in the Plasma desktop session). gamescope creates this directory itself; kwin does
# NOT — without it kwin logs "/tmp/.X11-unix does not exist … Failed to establish X11 socket" and
# runs Wayland-only, so X11 apps can't open a DISPLAY. The minimal ALARM base ships no xorg-server,
# which is what normally provides this tmpfiles entry. 1777 = sticky + world-writable, like /tmp.
d /tmp/.X11-unix 1777 root root -
