# pocknix grub.cfg — SM8250 family boot menu (arm-efi).
#
# This file is the SINGLE SOURCE OF TRUTH for the runtime kernel cmdline on
# sm8250: build-packages.sh dies if the "linux /KERNEL ..." line below drifts
# from devices/sm8250/profile.conf's KERNEL_CMDLINE. One menuentry per board;
# GRUB loads the raw Image at /KERNEL plus the board's dtb. When a second
# sm8250 board lands, add its menuentry and (optionally) port ROCKNIX's
# vbmeta_system_a partfind/strsearch autodetect block (their generated
# grub.cfg; needs their patched GRUB commands, which this vendored bootaa64.efi
# already contains).
insmod part_gpt
set timeout=0
set default='rp5'

menuentry 'pocknix (Retroid Pocket 5)' --id 'rp5' {
        search --set -f /KERNEL
        linux /KERNEL root=PARTLABEL=POCKNIX_ROOT rw quiet loglevel=3 systemd.show_status=false splash plymouth.ignore-serial-consoles rootwait console=tty0 video=efifb:off
        devicetree /boot/grub/sm8250-retroidpocket-rp5.dtb
}
