# pocknix grub.cfg — SM8250 family boot menu (arm-efi).
#
# This file is the SINGLE SOURCE OF TRUTH for the runtime kernel cmdline on
# sm8250: build-packages.sh dies if the first "linux /KERNEL ..." line below
# drifts from devices/sm8250/profile.conf's KERNEL_CMDLINE (all entries carry
# the identical cmdline). One menuentry per board; GRUB loads the raw Image at
# /KERNEL plus the board's dtb.
#
# Board selection: the default is rp5; a Flip 2 first-boots with the rp5 dtb
# (its DTS is the RP5's + the lid sensor, so everything but the lid works),
# then pocknix-sm8250-board-select detects the real board from the
# vbmeta_system_a token (ROCKNIX's detection source) and writes saved_entry
# into grubenv — the next boot picks the right dtb. (ROCKNIX's in-GRUB
# partfind/strsearch autodetect needs their rawsearch patch, which postdates
# the release our vendored bootaa64.efi comes from; revisit when re-vendoring.)
insmod part_gpt
load_env
set default='rp5'
if [ -n "${saved_entry}" ]; then
  set default="${saved_entry}"
fi
set timeout=0

# root= is the FIXED pocknix SD PARTUUID (SD_ROOT_PARTUUID in config/
# pocknix.conf, stamped by build-sd-image.sh): an internal install carries the
# same POCKNIX_ROOT name/label, so label-based resolution races when both are
# present (the RP5 stock ABL boots the SD first). The internal install rewrites
# its OWN grub.cfg copy with the internal partition's real PARTUUID
# (pocknix-update-grub re-pins root= on every /flash refresh).
menuentry 'pocknix (Retroid Pocket 5)' --id 'rp5' {
        search --set -f /KERNEL
        linux /KERNEL root=PARTUUID=706f636b-6e69-7830-726f-6f7400000002 rw quiet loglevel=3 systemd.show_status=false splash plymouth.ignore-serial-consoles rootwait console=tty0 video=efifb:off
        devicetree /boot/grub/sm8250-retroidpocket-rp5.dtb
}

menuentry 'pocknix (Retroid Pocket Flip 2)' --id 'rpflip2' {
        search --set -f /KERNEL
        linux /KERNEL root=PARTUUID=706f636b-6e69-7830-726f-6f7400000002 rw quiet loglevel=3 systemd.show_status=false splash plymouth.ignore-serial-consoles rootwait console=tty0 video=efifb:off
        devicetree /boot/grub/sm8250-retroidpocket-flip2.dtb
}
