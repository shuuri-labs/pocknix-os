# pocknix RetroArch defaults — seeded into ~/.config/retroarch/retroarch.cfg on first login by
# pocknix-roms-init IF the user has none. RetroArch fills in every other key with its own defaults
# on first run, so this stays minimal and only sets what matters for the "just works" experience.
# ROCKNIX-tuned per-core overrides can be layered on top later (config/remaps/overrides dirs).

# BIOS / system files live in the Emulation tree so the user has ONE place to drop everything.
# (~ is expanded to the deck home by RetroArch.)
system_directory = "~/Emulation/BIOS"

# Keep saves/states in the same tree, so a single ~/Emulation copy is self-contained and portable.
savefile_directory = "~/Emulation/Saves"
savestate_directory = "~/Emulation/States"
sort_savefiles_enable = "true"
sort_savestates_enable = "true"

# Adreno 740 via Turnip (our freedreno/turnip-only mesa): Vulkan is the fast path. Cores that only
# do GL still get the freedreno GL driver. If a specific core misbehaves on vulkan, override it
# per-core rather than flipping this globally.
video_driver = "vulkan"
video_fullscreen = "true"
video_vsync = "true"
# The RP6 panel is 120Hz-ONLY (no 60Hz mode — see the gamescope-refresh/EDID saga). ~60fps cores
# on a 120Hz swapchain need present-every-2nd-vblank. A/B'd on-device 2026-07-06 (GBA scroll test):
#   * swap_interval EXPLICIT 2 — buttery; 0/auto still left bouncy frametimes (auto re-decides and
#     doesn't pace as cleanly), and the default 1 vs an assumed-60Hz display was badly jittery.
#   * max_swapchain_images 2 (not default 3) — the extra queued image added pacing slack under
#     gamescope; 2 = tight vsync pacing. Revisit per-core if a heavy core (flycast/duckstation
#     upscaled) ever needs the deeper queue.
# Interval 2 assumes ~60fps content — right for nearly every core on this list. PAL 50Hz content
# can never be clean on a 120Hz-only panel; if it matters, set a per-core override, not global.
# Do NOT stack the SteamOS/QAM framerate limit on top: gamescope's limiter throttles frame
# callbacks and runs vsynced cores at HALF SPEED unless the perf overlay happens to keep the
# present clock hot (composite-tax interaction).
# refresh_rate + swap_interval are PER-DEVICE: pocknix-roms-init rewrites both at seed time
# from POCKNIX_PANEL_REFRESH (60Hz panels get 60/1 — on those, interval 2 paces at 30fps).
# The authored values below are the 120Hz (RP6) ones.
video_refresh_rate = "120.000000"
video_swap_interval = "2"
video_max_swapchain_images = "2"

# Clean, controller-navigable menu; gamepad auto-config on. In game mode the pad RetroArch sees
# is Steam Input's virtual "Microsoft X-Box 360 pad" (RSInput pad -> InputPlumber -> Steam Input);
# bindings come from the vendored autoconfig profiles (retroarch-autoconfig-pocknix, copied into
# ~/.config/retroarch/autoconfig by pocknix-roms-init). Without profiles controls are fully dead —
# bitten on-device 2026-07-06.
menu_driver = "ozone"
input_autodetect_enable = "true"
menu_swap_ok_cancel_buttons = "false"
# L3+R3 (click both sticks) toggles the RetroArch menu — device-independent combo that no game
# uses; from there Close Content exits cleanly (or Steam overlay -> Exit Game).
input_menu_toggle_gamepad_combo = "2"

# Left analog stick doubles as the D-pad (mode 1, non-forced): on digital-only systems (GBA, SNES,
# Genesis, …) the stick navigates like the D-pad — which keeps working too — and on cores that
# request real analog (N64, PSX DualShock, Dreamcast) the stick automatically reverts to analog.
# All 4 players so Bluetooth pads in multiplayer behave the same.
input_player1_analog_dpad_mode = "1"
input_player2_analog_dpad_mode = "1"
input_player3_analog_dpad_mode = "1"
input_player4_analog_dpad_mode = "1"

# Rewind off by default (costs RAM/CPU); users can enable per taste.
rewind_enable = "false"
