# pocknix RetroArch defaults — seeded into ~/.config/retroarch/retroarch.cfg on first login by
# pocknix-roms-init IF the user has none. RetroArch fills in every other key with its own defaults
# on first run, so this stays minimal and only sets what matters for the "just works" experience.
# ROCKNIX-tuned per-core overrides can be layered on top later (config/remaps/overrides dirs).

# BIOS / system files live in the ROM tree so the user has ONE place to drop everything.
# (~ is expanded to the deck home by RetroArch.)
system_directory = "~/ROMs/bios"

# Keep saves/states with the ROMs too, so a single ~/ROMs copy is self-contained and portable.
savefile_directory = "~/ROMs/saves"
savestate_directory = "~/ROMs/states"
sort_savefiles_enable = "true"
sort_savestates_enable = "true"

# Adreno 740 via Turnip (our freedreno/turnip-only mesa): Vulkan is the fast path. Cores that only
# do GL still get the freedreno GL driver. If a specific core misbehaves on vulkan, override it
# per-core rather than flipping this globally.
video_driver = "vulkan"
video_fullscreen = "true"
video_vsync = "true"

# Clean, controller-navigable menu; gamepad auto-config on (RSInput/InputPlumber pad).
menu_driver = "ozone"
input_autodetect_enable = "true"
menu_swap_ok_cancel_buttons = "false"

# Rewind off by default (costs RAM/CPU); users can enable per taste.
rewind_enable = "false"
