<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- pocknix: round Steam-style badge used as the `steam` themed icon, so the desktop Steam tile
       and the "Return to Game Mode" tile have a Steam logo instead of the blank-document fallback.
       The native ARM Steam client isn't a system package, so nothing else provides a `steam` icon. -->
  <defs>
    <radialGradient id="pocknixSteamBg" cx="36%" cy="30%" r="85%">
      <stop offset="0%" stop-color="#2a475e"/>
      <stop offset="100%" stop-color="#171a21"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="128" fill="url(#pocknixSteamBg)"/>
  <!-- piston rod connecting the knob to the body (drawn first, circles sit on top) -->
  <line x1="96" y1="98" x2="150" y2="152" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
  <!-- body (cylinder) as a white ring -->
  <circle cx="150" cy="152" r="48" fill="#ffffff"/>
  <circle cx="150" cy="152" r="19" fill="#171a21"/>
  <!-- knob (piston head) as a smaller white ring -->
  <circle cx="96" cy="98" r="27" fill="#ffffff"/>
  <circle cx="96" cy="98" r="11" fill="#171a21"/>
</svg>
