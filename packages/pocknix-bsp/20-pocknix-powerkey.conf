# Power button behavior. systemd's default is HandlePowerKey=poweroff, which made a
# wake-press (when the device is asleep) shut the device DOWN. Set it to 'ignore' so the
# power button simply wakes the device and leaves it awake. A long press still powers off.
# Sleep is invoked from Steam's power menu / `systemctl suspend`, not the kernel key handler.
# (See docs/sm8550-suspend-wake-report.md.)
[Login]
HandlePowerKey=ignore
HandlePowerKeyLongPress=poweroff
