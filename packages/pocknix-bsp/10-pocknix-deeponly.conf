# Pin deep ("mem") suspend only; drop systemd's default "mem standby freeze"
# fall-through. On SM8550 a failed deep attempt that degrades to s2idle ("freeze")
# can park forever in s2idle_enter() (the edge-triggered PMIC power-key wake isn't
# re-delivered to break the swait, and there's no hardware watchdog) -> unrecoverable.
# Deep resumes cleanly, so a failed deep should cleanly no-op, not degrade. SuspendState
# is a list (drop-ins append), so reset it first, then pin mem. (Mirrors ROCKNIX's
# SM8550 030-suspend_mode quirk.)
[Sleep]
SuspendState=
SuspendState=mem
