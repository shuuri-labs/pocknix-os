# Power button contract (three layers — keep in sync with pocknix-powerd):
#   short press (<=0.8s)  -> suspend   (pocknix-powerd daemon, overlay)
#   long press  (>=5s)    -> poweroff  (HandlePowerKeyLongPress below)
#   press while asleep    -> wake      (PMIC wakeup source; kernel)
# HandlePowerKey stays 'ignore': systemd's default (poweroff) shut the device DOWN on a
# wake-press — the RP6 delivers the waking KEY_POWER to userspace after resume. That same
# delivery is why short-press-suspend lives in pocknix-powerd (which debounces after
# resume) and NOT here: logind has no resume holdoff for the power key, so
# HandlePowerKey=suspend would re-suspend on every wake press.
# (See docs/sm8550-suspend-wake-report.md.)
[Login]
HandlePowerKey=ignore
HandlePowerKeyLongPress=poweroff
