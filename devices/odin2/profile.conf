# devices/odin2/profile.conf — build-time device profile: AYN Odin 2.
#
# Same-SoC sibling of devices/rp6 (see devices/README.md): the Odin 2 shares the
# sm8550 kernel tree/package, the firmware overlay, and the qcom-abl boot contract
# with the RP6 — its DTB (qcs8550-ayn-odin2.dts) is already in the shared boot image.
# Only the identity + device packages differ. POSIX sh, sourced by scripts/lib.sh
# right after config/pocknix.conf; override any value from the environment as usual.

DEVICE_PRETTY="AYN Odin 2"
DEVICE_HOSTNAME="Odin2"       # substituted for @DEVICENAME@ in the kernel config (CONFIG_DEFAULT_HOSTNAME)
: "${SOC:=sm8550}"            # selects kernel/${SOC}/ and vendor/rocknix-${SOC}/

# --- qcom-abl boot contract (what the stock bootloader expects) --------------
# Identical to the RP6's: ROCKNIX's DISTRO_BOOTLABEL is set distribution-wide,
# not per-device, so every SM8550 board's ROCKNIX ABL looks for the same FAT label.
: "${SD_FAT_LABEL:=ROCKNIX}"        # = ROCKNIX's DISTRO_BOOTLABEL
: "${SD_BOOT_PARTNAME:=system}"     # GPT name of the FAT boot partition (ROCKNIX uses "system")
: "${ROOT_LABEL:=POCKNIX_ROOT}"

# --- kernel command line ------------------------------------------------------
# Same as the RP6's: the EXTRA params are ROCKNIX's SM8550 EXTRA_CMDLINE (the usbcore
# interrupt override is ROCKNIX's SoC-wide Xbox-pad quirk, not an RP6-ism) plus the
# pocknix SoC-level additions (silent boot/plymouth, UFS uic timeout, deep-only sleep).
: "${KERNEL_CMDLINE_ROOT:=root=PARTLABEL=${ROOT_LABEL} rw}"
: "${KERNEL_CMDLINE_EXTRA:=quiet loglevel=3 systemd.show_status=false splash plymouth.ignore-serial-consoles rootwait console=tty0 allow_mismatched_32bit_el0 fw_devlink.strict=1 pcie_ports=compat irqaffinity=0-2 cgroup.memory=nokmem,nosocket nosoftlockup usbcore.interrupt_interval_override=045e:028e:2 ufshcd_core.uic_cmd_timeout=3000 mem_sleep_default=deep}"
: "${KERNEL_CMDLINE:=${KERNEL_CMDLINE_ROOT} ${KERNEL_CMDLINE_EXTRA}}"

# --- firmware source (within vendor/, populated by `make sync`) ---------------
# Shared SoC tree; the Odin 2's own blobs (qcom/sm8550/ayn/odin2/adsp.mbn,
# aw883xx_acf.bin) live inside it and rsync in with everything else.
: "${FW_SRC_REL:=rocknix-${SOC}/filesystem/usr/lib/kernel-overlays/base/lib/firmware}"

# --- device packages (built from devices/odin2/packages/, installed by build-image)
: "${DEVICE_BSP_PKG:=pocknix-bsp-odin2}"
: "${DEVICE_META_PKG:=pocknix-device-odin2}"
: "${KERNEL_PKG:=linux-pocknix-${SOC}}"
