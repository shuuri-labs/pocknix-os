# /usr/lib/pocknix/device.conf — runtime device facts: AYN Odin 2.
#
# Shipped by pocknix-bsp-odin2. Shared session scripts (pocknix-steam,
# pocknix-desktop-rotate, ...) source this instead of hardcoding device values.
# NOTE: the consumers' built-in fallbacks are the RP6 values, so on this device the
# file MUST be present (the RP6 orientation is the opposite of the Odin 2's).
# Admin overrides go in /etc/pocknix/device.conf (sourced after this, so it wins).
# POSIX sh.
POCKNIX_DEVICE=odin2
POCKNIX_SOC=sm8550

# Panel: syna,td4328 — native 1080x1920@60 portrait, DTS rotation=90 -> landscape.
# W/H are gamescope -W/-H in NATIVE PORTRAIT (--use-rotation-shader wants the
# pre-rotation frame; see the rp6 device.conf for the full story).
# Orientation token: the RP6 anchors the mapping (DTS rotation=270 -> left); the
# Odin 2 is mounted the other way (90), so the token is right. VERIFY on device:
# an upside-down picture means it should be left.
POCKNIX_PANEL_W=1080
POCKNIX_PANEL_H=1920
POCKNIX_PANEL_REFRESH=60
POCKNIX_PANEL_ORIENT=right       # gamescope --force-orientation
# GAMESCOPE_FAKE_OUTPUT_MM (gamepadui DPI). Deliberately fake, landscape-oriented:
# same 1920x1080 output as the RP6, so the same value keeps the ~275dpi handheld UI.
POCKNIX_PANEL_MM=177x100

# Desktop (Plasma Mobile) session:
POCKNIX_DESKTOP_ROTATE=right     # kscreen-doctor rotation token (see ORIENT note)
POCKNIX_DESKTOP_SCALE=2.5        # start at the RP6 value (similar panel DPI); tune on device

# Internal-install boot contract, read by pocknix-install-internal /
# pocknix-uninstall-internal / pocknix-installer-gui. The scripts' built-in
# defaults equal these values; listed so the installers stay device-parameterized.
POCKNIX_INTERNAL_DISK=/dev/sda
POCKNIX_BOOT_GPT_NAME=ROCKNIX
POCKNIX_BOOT_FAT_LABEL=ROCKNIX
POCKNIX_ROOT_LABEL=POCKNIX_ROOT
