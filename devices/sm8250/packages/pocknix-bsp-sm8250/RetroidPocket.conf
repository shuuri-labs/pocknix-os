# ALSA UCM master config for the Retroid Pocket sm8250 sound card (DTS model
# "RetroidPocket": WSA881x speakers + WCD9385 headphones on sm8250-sndcard).
#
# Ported from ROCKNIX alsa-ucm-conf patches/SM8250/0002_Add-Retroid-Pocket-
# SM8250-configuration.patch (author Teguh Sobirin). UCM is NOT covered by
# `make sync` — re-diff against that patch when bumping the ROCKNIX pin.
# One pocknix change: the patch's new /codecs/wsa881x/init.conf is INLINED
# below (LibraryConfig block) instead of shipped — upstream alsa-ucm-conf
# doesn't have that file yet, and shipping it would risk a pacman file
# conflict if ALARM's alsa-ucm-conf ever adds it.
#
# NB: the BootSequence below is ROCKNIX provenance but is NOT EXECUTED on
# Arch (nothing runs `alsaucm boot`, and PipeWire runs soft-mixer on this
# card). The enforced hardware gains live in pocknix-sm8250-audio-heal's
# apply_gains(), with louder validated values — treat that as the source of
# truth and this sequence as upstream reference.
Syntax 4

SectionUseCase."HiFi" {
	File "/Qualcomm/sm8250/HiFi-RP.conf"
	Comment "HiFi quality Music."
}

BootSequence [
	cset "name='WSA_RX0 Digital Volume' 120"
	cset "name='WSA_RX1 Digital Volume' 120"
	cset "name='SpkrLeft PA Volume' 12"
	cset "name='SpkrRight PA Volume' 12"
	cset "name='HPHL Volume' 20"
	cset "name='HPHR Volume' 20"
	cset "name='ADC2 Volume' 10"
]

Include.card-init.File "/lib/card-init.conf"
Include.ctl-remap.File "/lib/ctl-remap.conf"
Include.wcd-init.File "/codecs/wcd938x/init.conf"
Include.rxm-init.File "/codecs/qcom-lpass/rx-macro/init.conf"

# Inlined from the ROCKNIX patch's ucm2/codecs/wsa881x/init.conf:
# merge the two mono speaker PA controls into one stereo "Speakers Volume".
LibraryConfig.remap.Config {

	ctl.default.map {
		# Merge two mono controls into one stereo
		"name='Speakers Volume'" {
			"name='SpkrLeft PA Volume'".vindex.0 0
			"name='SpkrRight PA Volume'".vindex.1 0
		}
	}
}
