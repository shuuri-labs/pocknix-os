# pocknix (RP5): loudness-maximized virtual sink in front of the speaker sink.
# The RP5's speaker hardware chain is already at its clean-gain ceiling
# (+40dB digital, +18dB PA, 8.5V boost rail) and is still quiet — the same
# drivers get their Android loudness from aggressive DSP compression, so we
# do the equivalent: +9dB makeup gain into a fast lookahead limiter
# (swh-plugins LADSPA), which raises perceived loudness without hard
# clipping. Apps play into "Speakers (Loud)"; it feeds the real UCM speaker
# sink. Headphones keep the direct (uncompressed) path.
context.modules = [
  { name = libpipewire-module-filter-chain
    args = {
      node.description = "Speakers (Loud)"
      media.name       = "Speakers (Loud)"
      filter.graph = {
        nodes = [
          {
            type   = ladspa
            name   = limiter
            plugin = fast_lookahead_limiter_1913
            label  = fastLookaheadLimiter
            control = {
              "Input gain (dB)" = 9.0
              "Limit (dB)"      = -0.5
              "Release time (s)" = 0.15
            }
          }
        ]
      }
      capture.props = {
        node.name    = "pocknix_speaker_loud"
        media.class  = Audio/Sink
        audio.position = [ FL FR ]
        # smart filter: WirePlumber inserts this in front of the target sink
        # transparently; the default sink stays the REAL device, so jack
        # insert still auto-switches to Headphones (bypassing the limiter).
        filter.smart = true
        filter.smart.target = { node.name = "alsa_output.platform-sound.HiFi__Speaker__sink" }
      }
      playback.props = {
        node.name    = "pocknix_speaker_loud_out"
        node.passive = true
        audio.position = [ FL FR ]
        stream.dont-remix = true
      }
    }
  }
]
