# /usr/lib/pocknix/boards/rpflip2.conf — runtime board facts: Retroid Pocket
# Flip 2. Selected by /usr/lib/pocknix/device.conf (DT model "Retroid Pocket
# Flip2"). UNVERIFIED ON HARDWARE: the Flip2 DTS #includes the RP5's wholesale
# (same ch13726a,rp5 panel, gamepad MCU, RetroidPocket sound card) and adds
# only the lid hall sensor (SW_LID, wakeup-source) — close-lid-to-sleep works
# via systemd-logind's default HandleLidSwitch=suspend, nothing to configure.
POCKNIX_DEVICE=rpflip2
POCKNIX_SOC=sm8250

# Panel: CH13726A AMOLED, native 1080x1920@60 PORTRAIT, mounted rotation=270
# (DTS panel node) -> landscape, same transpose contract as the RP6: gamescope
# gets the NATIVE portrait mode + --force-orientation left (rotation shader).
POCKNIX_PANEL_W=1080
POCKNIX_PANEL_H=1920
POCKNIX_PANEL_REFRESH=60
POCKNIX_PANEL_ORIENT=left        # gamescope --force-orientation
POCKNIX_PANEL_MM=177x100         # DELIBERATE LIE (real panel: 68x121 portrait =
                                 # 121x68 landscape): this feeds gamescope's
                                 # GAMESCOPE_FAKE_OUTPUT_MM, and the true ~400dpi
                                 # size makes Steam's gamepadui scale WAY too big.
                                 # RP6's 177x100 gives the right UI size on the
                                 # same 1080x1920 panel (validated on device
                                 # 2026-07-13).
POCKNIX_DESKTOP_ROTATE=left      # kscreen-doctor rotation token
POCKNIX_DESKTOP_SCALE=2.5        # same panel res/size class as the RP6

# CPU topology: Snapdragon 865 = cpu0-3 A55 (little), cpu4-7 A77 (big).
# Consumed by pocknix-play's emulator core pinning (sm8550 devices are 3-7).
POCKNIX_BIG_CORES=4-7

# --- install-to-internal contract (arm-efi) -----------------------------------
# Recon'd on the RP5 2026-07-16: internal main LUN = /dev/sda (117GiB KIOXIA UFS,
# 4K logical sectors), Android GPT with userdata as the LAST partition (#23,
# ~107GiB) — the shrink-and-append flow applies unchanged. The boot chain
# (abl_a/b, boot_a/b, tz, ...) lives on the separate /dev/sde LUN and is never
# touched. BOOT_STYLE selects the arm-efi handling in the installer scripts
# (grub.cfg + fstab pinned to the internal PARTUUIDs at install time).
POCKNIX_BOOT_STYLE=arm-efi
POCKNIX_INTERNAL_DISK=/dev/sda
POCKNIX_BOOT_GPT_NAME=ROCKNIX
POCKNIX_BOOT_FAT_LABEL=ROCKNIX
POCKNIX_ROOT_LABEL=POCKNIX_ROOT
