# /usr/lib/pocknix/boards/rp5.conf — runtime board facts: Retroid Pocket 5.
# Selected by /usr/lib/pocknix/device.conf (DT model "Retroid Pocket 5").
POCKNIX_DEVICE=rp5
POCKNIX_SOC=sm8250

# Panel: CH13726A AMOLED, native 1080x1920@60 PORTRAIT, mounted rotation=270
# (DTS panel node) -> landscape, same transpose contract as the RP6: gamescope
# gets the NATIVE portrait mode + --force-orientation left (rotation shader).
POCKNIX_PANEL_W=1080
POCKNIX_PANEL_H=1920
POCKNIX_PANEL_REFRESH=60
POCKNIX_PANEL_ORIENT=left        # gamescope --force-orientation
POCKNIX_PANEL_MM=121x68          # landscape WxH (DTS: 68x121 portrait)
POCKNIX_DESKTOP_ROTATE=left      # kscreen-doctor rotation token
POCKNIX_DESKTOP_SCALE=2.5        # same panel res/size class as the RP6

# CPU topology: Snapdragon 865 = cpu0-3 A55 (little), cpu4-7 A77 (big).
# Consumed by pocknix-play's emulator core pinning (sm8550 devices are 3-7).
POCKNIX_BIG_CORES=4-7

# --- install-to-internal contract (arm-efi) -----------------------------------
# BOOT_STYLE gates the installer scripts: they implement the qcom-abl (SM8550)
# internal contract and refuse anything else, so the RP6 fallbacks can never
# fire here. The arm-efi install flow + the disk/partition keys land after
# on-device recon of the RP5's internal UFS GPT.
POCKNIX_BOOT_STYLE=arm-efi
#POCKNIX_INTERNAL_DISK=/dev/sda
#POCKNIX_BOOT_GPT_NAME=ROCKNIX
#POCKNIX_BOOT_FAT_LABEL=ROCKNIX
#POCKNIX_ROOT_LABEL=POCKNIX_ROOT
