# pocknix (sm8250): keep PipeWire OFF the hardware mixer for the RetroidPocket
# card. The RP5's UCM boots the path HOT (+36dB WSA digital, +18dB speaker PA
# — small drivers need it), but PipeWire's hardware-volume mapping treats
# 100% as 0dB total path gain and pulls those controls down, which is why
# Steam (via PipeWire) is drastically quieter than raw-ALSA players on this
# hardware (same on ROCKNIX, per their reports). soft-mixer leaves the UCM
# boot values planted and applies volume in software below that ceiling.
monitor.alsa.rules = [
  {
    matches = [
      { alsa.card_name = "RetroidPocket" }
    ]
    actions = {
      update-props = {
        api.alsa.soft-mixer = true
      }
    }
  }
]
