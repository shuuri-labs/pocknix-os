# /usr/lib/pocknix/device.conf — SM8250 family: runtime board DISPATCHER.
#
# Unlike the per-device sm8550 BSPs (where this file IS the board facts), the
# sm8250 image serves every board on the SoC, so this file is POSIX sh that
# picks the right board file at SOURCE time by devicetree model. Consumers
# (pocknix-steam, pocknix-desktop-rotate, the installer scripts) already
# source this path at their own launch, then /etc/pocknix/device.conf as the
# admin override — both behaviors carry over unchanged.
#
# Unknown/absent model (includes the image-build chroot, which has no
# /proc/device-tree) falls back to the first board and logs: consumers keep
# working with plausible facts, and the log line names the model a new board
# entry needs. Boards live in /usr/lib/pocknix/boards/.
_pocknix_model="$(cat /proc/device-tree/model 2>/dev/null | tr -d '\0')"
case "${_pocknix_model}" in
  "Retroid Pocket 5")
    . /usr/lib/pocknix/boards/rp5.conf
    ;;
  *)
    . /usr/lib/pocknix/boards/rp5.conf
    [ -n "${_pocknix_model}" ] && \
      logger -t pocknix "device.conf: unknown DT model '${_pocknix_model}' — using rp5 board defaults" 2>/dev/null || true
    ;;
esac
unset _pocknix_model
