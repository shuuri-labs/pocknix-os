# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/composite_device_v1.json
# InputPlumber composite device for the Retroid Pocket Flip 2 gamepad.
#
# Same retroid-pocket-gamepad serial MCU as the RP5 (the Flip2 DTS #includes
# the RP5's), gated on the Flip2's devicetree model. Separate config from the
# RP5's only because the capability maps differ: the RP5's is confirmed
# paddle-less on hardware, the Flip 2 keeps ROCKNIX's full map (paddles
# included) until hardware says otherwise.
#
# The lid hall sensor (gpio-keys-lid, SW_LID) is deliberately NOT a source
# device: systemd-logind must see it directly for close-lid-to-suspend.
version: 1
kind: CompositeDevice
name: Retroid Pocket Flip 2

matches:
  - udev:
      sys_path: /sys/firmware/devicetree/base
      attributes:
        - name: model
          value: Retroid Pocket Flip2

single_source: false

source_devices:
  - group: gamepad
    evdev:
      phys_path: retroid-pocket-gamepad/input0
      handler: event*
    capability_map_id: retroid_rpflip2

options:
  auto_manage: true

target_devices:
  - deck
  - keyboard
