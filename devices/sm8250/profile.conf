# devices/sm8250/profile.conf — build-time profile: the SM8250 FAMILY image.
#
# First per-SoC image target (one image per SoC, runtime board selection
# within it — ROCKNIX-style). DEVICE here names the image target, not a single
# board: the BSP (pocknix-bsp-sm8250) ships per-board device.confs under
# /usr/lib/pocknix/boards/ and picks one at runtime by /proc/device-tree/model.
# Boards on this SoC today: Retroid Pocket 5 (only). The sm8550 devices still
# use the older one-dir-per-device layout until their collapse to this shape.
#
# POSIX sh, sourced by scripts/lib.sh right after config/pocknix.conf; override
# any value from the environment as usual.

DEVICE_PRETTY="SM8250 family (Retroid Pocket 5)"
DEVICE_HOSTNAME="RP5"         # substituted for @DEVICENAME@ in the kernel config (CONFIG_DEFAULT_HOSTNAME)
: "${SOC:=sm8250}"            # selects kernel/${SOC}/ and vendor/rocknix-${SOC}/

# --- arm-efi boot contract (what the ROCKNIX-flashed ABL expects) -------------
# UNLIKE sm8550 (qcom-abl: ABL boots an Android boot image /KERNEL directly),
# SM8250 ROCKNIX ABL chainloads UEFI GRUB: XBL -> abl_signed-SM8250.elf ->
# EFI/BOOT/bootaa64.efi -> grub.cfg -> "linux /KERNEL" (RAW arm64 Image) +
# "devicetree /boot/grub/<board>.dtb". The kernel cmdline lives in grub.cfg
# (shipped by pocknix-bootloader-sm8250), not in a boot-image header.
# GPT p1: FAT32, partition-name SD_BOOT_PARTNAME, FAT label SD_FAT_LABEL,
# containing KERNEL + KERNEL.md5 + EFI/ + boot/grub/ + rocknix_abl/.
# GPT p2: ext4, partition-name ROOT_LABEL.
: "${BOOTLOADER:=arm-efi}"
: "${SD_FAT_LABEL:=ROCKNIX}"        # = ROCKNIX's DISTRO_BOOTLABEL; GRUB finds /KERNEL by search, label kept for contract parity
: "${SD_BOOT_PARTNAME:=system}"     # GPT name of the FAT boot partition (ROCKNIX uses "system")
: "${ROOT_LABEL:=POCKNIX_ROOT}"

# --- kernel command line ------------------------------------------------------
# Plain ext4 root, NO initramfs (UFS/SCSI/ext4 built-in), standard root= spec.
# EXTRA = ROCKNIX's SM8250 EXTRA_CMDLINE (quiet rootwait console=tty0
# video=efifb:off) + the pocknix silent-boot set (see devices/rp6/profile.conf
# for the rationale). None of the sm8550-specific params (irqaffinity, pcie
# compat, usb interrupt override, UFS uic timeout, deep-only sleep) apply here.
#
# NB: for arm-efi this string's single source of truth at RUNTIME is the
# "linux /KERNEL ..." line in packages/pocknix-bootloader-sm8250/grub.cfg —
# build-packages.sh enforces that the two never drift.
: "${KERNEL_CMDLINE_ROOT:=root=PARTLABEL=${ROOT_LABEL} rw}"
: "${KERNEL_CMDLINE_EXTRA:=quiet loglevel=3 systemd.show_status=false splash plymouth.ignore-serial-consoles rootwait console=tty0 video=efifb:off}"
: "${KERNEL_CMDLINE:=${KERNEL_CMDLINE_ROOT} ${KERNEL_CMDLINE_EXTRA}}"

# --- firmware source (within vendor/, populated by `make sync`) ---------------
# ROCKNIX ships NO firmware overlay for SM8250 (its blobs all come from
# upstream kernel-firmware, built in via CONFIG_EXTRA_FIRMWARE); we rely on
# ALARM's linux-firmware/linux-firmware-qcom packages in the rootfs instead.
# The path is kept for the standard layout; build-image.sh treats a missing/
# empty overlay as expected on this SoC.
: "${FW_SRC_REL:=rocknix-${SOC}/filesystem/usr/lib/kernel-overlays/base/lib/firmware}"

# --- device packages (built from devices/sm8250/packages/, installed by build-image)
: "${DEVICE_BSP_PKG:=pocknix-bsp-sm8250}"
: "${DEVICE_META_PKG:=pocknix-device-sm8250}"
: "${KERNEL_PKG:=linux-pocknix-${SOC}}"
