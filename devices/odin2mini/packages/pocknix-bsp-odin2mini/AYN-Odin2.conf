# ALSA UCM for the AYN Odin 2 sound card (longname "AYN-Odin2" — this is the card
# the UCM was written for; the RP6's BSP borrows the same files). Ported from ROCKNIX
# (alsa-ucm-conf patches/SM8550/0001_Add-AYN-Odin2; WCD9385 codec + aw88166 MI2S amps).
# Original author: Teguh Sobirin <teguh@sobir.in>

Syntax 4

SectionUseCase."HiFi" {
	File "/AYN/Odin2/HiFi.conf"
	Comment "HiFi quality Music."
}

BootSequence [
	cset "name='RX_RX0 Digital Volume' 84"
	cset "name='RX_RX1 Digital Volume' 84"
	cset "name='HPHL Volume' 20"
	cset "name='HPHR Volume' 20"
	cset "name='ADC2 Volume' 10"
]

LibraryConfig.remap.Config {

	ctl.default.map {
		"name='HP Volume'" {
			"name='HPHL Volume'".vindex.0 0
			"name='HPHR Volume'".vindex.1 0
		}
	}
}

Include.card-init.File "/lib/card-init.conf"
Include.ctl-remap.File "/lib/ctl-remap.conf"
Include.wcd-init.File "/codecs/wcd938x/init.conf"
