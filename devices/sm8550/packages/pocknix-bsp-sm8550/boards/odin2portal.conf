# /usr/lib/pocknix/boards/odin2portal.conf — runtime board facts: AYN Odin 2 Portal.
# Selected by /usr/lib/pocknix/device.conf (DT model "AYN Odin 2 Portal").
# UNVERIFIED ON HARDWARE (authored from the DTS; see the retired
# devices/odin2portal history for the derivation notes).
POCKNIX_DEVICE=odin2portal
POCKNIX_SOC=sm8550

# Panel: chipone,icna3512 — native 1080x1920@120 portrait, DTS rotation=270 ->
# landscape (SAME mounting as the RP6 -> token left). The panel driver also
# carries a 60Hz mode (unlike the single-mode RP6 panel).
POCKNIX_PANEL_W=1080
POCKNIX_PANEL_H=1920
POCKNIX_PANEL_REFRESH=120
POCKNIX_PANEL_ORIENT=left        # gamescope --force-orientation
POCKNIX_PANEL_MM=177x100         # deliberately fake: same 1920x1080 output as the RP6 -> same ~275dpi UI
POCKNIX_DESKTOP_ROTATE=left      # kscreen-doctor rotation token
POCKNIX_DESKTOP_SCALE=2.5        # 7" panel could take less (2.25); tune on device

# CPU topology: big-core mask for emulator pinning (pocknix-play).
POCKNIX_BIG_CORES=3-7

# --- install-to-internal contract (qcom-abl; RP6-verified values, same SoC) ----
POCKNIX_INTERNAL_DISK=/dev/sda
POCKNIX_BOOT_GPT_NAME=ROCKNIX
POCKNIX_BOOT_FAT_LABEL=ROCKNIX
POCKNIX_ROOT_LABEL=POCKNIX_ROOT
