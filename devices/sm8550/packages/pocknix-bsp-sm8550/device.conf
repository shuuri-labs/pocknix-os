# /usr/lib/pocknix/device.conf — SM8550 family: runtime board DISPATCHER.
#
# POSIX sh that picks the right board facts at SOURCE time by devicetree model
# (same mechanism as the sm8250 family BSP). Consumers (pocknix-steam,
# pocknix-desktop-rotate, pocknix-play, the installer scripts) source this
# path at their own launch, then /etc/pocknix/device.conf as the admin
# override — both behaviors carry over from the per-device BSPs unchanged.
#
# Unknown/absent model (includes the image-build chroot, which has no
# /proc/device-tree) falls back to rp6 and logs: consumers keep working with
# plausible facts (their built-in fallbacks are the rp6 values anyway), and
# the log line names the model a new board entry needs. Boards live in
# /usr/lib/pocknix/boards/.
_pocknix_model="$(cat /proc/device-tree/model 2>/dev/null | tr -d '\0')"
case "${_pocknix_model}" in
  "Retroid Pocket 6" | "Retroid Pocket 6 TOP-DPAD")
    . /usr/lib/pocknix/boards/rp6.conf
    ;;
  "AYN Odin 2")
    . /usr/lib/pocknix/boards/odin2.conf
    ;;
  "AYN Odin 2 Mini")
    . /usr/lib/pocknix/boards/odin2mini.conf
    ;;
  "AYN Odin 2 Portal")
    . /usr/lib/pocknix/boards/odin2portal.conf
    ;;
  *)
    . /usr/lib/pocknix/boards/rp6.conf
    [ -n "${_pocknix_model}" ] && \
      logger -t pocknix "device.conf: unknown DT model '${_pocknix_model}' — using rp6 board defaults" 2>/dev/null || true
    ;;
esac
unset _pocknix_model
