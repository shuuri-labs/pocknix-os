# devices/sm8550/profile.conf — build-time profile: the SM8550 FAMILY image.
#
# One image per SoC, runtime board selection within it (same shape as
# devices/sm8250): the BSP (pocknix-bsp-sm8550) ships per-board device.confs
# under /usr/lib/pocknix/boards/ and picks one at boot by
# /proc/device-tree/model. Boards: Retroid Pocket 6 (incl. TOP-DPAD), AYN
# Odin 2 / Mini / Portal. Successor to the retired per-device targets
# devices/{rp6,odin2,odin2mini,odin2portal}, whose build-time facts (labels,
# cmdline) were identical anyway — the qcom-abl boot image already carried
# every board's dtb and the ABL picks by board id.
#
# POSIX sh, sourced by scripts/lib.sh right after config/pocknix.conf; override
# any value from the environment as usual.

DEVICE_PRETTY="SM8550 family (Retroid Pocket 6, AYN Odin 2 family)"
DEVICE_HOSTNAME="pocknix"     # substituted for @DEVICENAME@ in the kernel config (CONFIG_DEFAULT_HOSTNAME; runtime hostname is set by the image anyway)
: "${SOC:=sm8550}"            # selects kernel/${SOC}/ and vendor/rocknix-${SOC}/

# --- qcom-abl boot contract (what the ROCKNIX-flashed ABL expects) -------------
# GPT p1: FAT32, partition-name SD_BOOT_PARTNAME, FAT label SD_FAT_LABEL,
# containing KERNEL + KERNEL.md5. GPT p2: ext4, partition-name ROOT_LABEL.
: "${BOOTLOADER:=qcom-abl}"
: "${SD_FAT_LABEL:=ROCKNIX}"        # the ABL looks for this label; = ROCKNIX's DISTRO_BOOTLABEL
: "${SD_BOOT_PARTNAME:=system}"     # GPT name of the FAT boot partition (ROCKNIX uses "system")
: "${ROOT_LABEL:=POCKNIX_ROOT}"

# --- kernel command line ------------------------------------------------------
# Plain ext4 root, NO initramfs (UFS/SCSI/ext4 built-in), standard root= spec.
# One cmdline for the whole family (the boot image bakes it): it was already
# byte-identical across all four boards' retired profiles. EXTRA = ROCKNIX's
# SM8550 EXTRA_CMDLINE + pocknix silent boot + the SM8550 quirks (usb interrupt
# override, UFS uic timeout, deep-only sleep).
: "${KERNEL_CMDLINE_ROOT:=root=PARTLABEL=${ROOT_LABEL} rw}"
: "${KERNEL_CMDLINE_EXTRA:=quiet loglevel=3 systemd.show_status=false splash plymouth.ignore-serial-consoles rootwait console=tty0 allow_mismatched_32bit_el0 fw_devlink.strict=1 pcie_ports=compat irqaffinity=0-2 cgroup.memory=nokmem,nosocket nosoftlockup usbcore.interrupt_interval_override=045e:028e:2 ufshcd_core.uic_cmd_timeout=3000 mem_sleep_default=deep}"
: "${KERNEL_CMDLINE:=${KERNEL_CMDLINE_ROOT} ${KERNEL_CMDLINE_EXTRA}}"

# --- firmware source (within vendor/, populated by `make sync`) ---------------
: "${FW_SRC_REL:=rocknix-${SOC}/filesystem/usr/lib/kernel-overlays/base/lib/firmware}"

# --- device packages (built from devices/sm8550/packages/, installed by build-image)
: "${DEVICE_BSP_PKG:=pocknix-bsp-sm8550}"
: "${DEVICE_META_PKG:=pocknix-device-sm8550}"
: "${KERNEL_PKG:=linux-pocknix-${SOC}}"
