# /usr/lib/pocknix/device.conf — runtime device facts: Retroid Pocket 6.
#
# Shipped by pocknix-bsp-rp6. Shared session scripts (pocknix-steam,
# pocknix-desktop-rotate, ...) source this instead of hardcoding device values;
# their fallbacks equal these RP6 values, so behavior is identical even if the
# file is absent. Admin overrides go in /etc/pocknix/device.conf (sourced after
# this file, so it wins). POSIX sh.
POCKNIX_DEVICE=rp6
POCKNIX_SOC=sm8550

# Panel: native 1080x1920@120 portrait, mounted rotation=270 -> landscape 1920x1080.
# W/H are the gamescope -W/-H values in NATIVE PORTRAIT: --use-rotation-shader wants the
# pre-rotation (native) frame and swaps it to landscape itself (unlike the old composite-
# rotation flag, which took post-rotation 1920x1080). Get this transpose right or the panel
# renders wrong/black. Matches ROCKNIX's launch exactly.
POCKNIX_PANEL_W=1080
POCKNIX_PANEL_H=1920
POCKNIX_PANEL_REFRESH=120
POCKNIX_PANEL_ORIENT=left        # gamescope --force-orientation
# GAMESCOPE_FAKE_OUTPUT_MM (gamepadui DPI; ~275dpi handheld UI). Stays landscape-oriented:
# Big Picture sees the rotated LANDSCAPE output, so the pixel<->mm/DPI pairing is unchanged.
POCKNIX_PANEL_MM=177x100

# Desktop (Plasma Mobile) session:
POCKNIX_DESKTOP_ROTATE=left      # kscreen-doctor rotation token
POCKNIX_DESKTOP_SCALE=2.5
