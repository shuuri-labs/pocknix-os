# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/main/rootfs/usr/share/inputplumber/schema/composite_device_v1.json
# InputPlumber composite device for the Retroid Pocket 6 gamepad.
#
# The RP6 gamepad is the in-kernel RSInput driver (CONFIG_JOYSTICK_RETROID), phys
# "rsinput-gamepad/input0". Verified on-device (/proc/bus/input/devices + evtest): X/Y are
# swapped at the driver, and the d-pad (BTN_DPAD_*) didn't reach the target under InputPlumber's
# auto-detect. So we apply an explicit capability_map (rp6-gamepad.yaml, id rp6_gamepad — armada's
# AYN/Odin map, which matches the RP6 on the same source) to fix X/Y + d-pad + Guide/QuickAccess.
#
# Target = `deck` (Steam Deck controller) so Steam Input gets a first-class Steam-native pad.
#
# The back paddles are a SEPARATE evdev node from the gamepad: the DTS wires them to the
# platform "gpio-keys" device (phys "gpio-keys/input0") as BTN_Z (left) / BTN_C (right).
# Since kernel 7.1.2 they emit again, so Steam saw them as a stray "gpio keys" controller.
# We add gpio-keys as a second source so InputPlumber grabs it and folds BTN_Z/BTN_C into
# the deck pad as LeftPaddle1/RightPaddle1 (the Deck's L4/L5 back buttons) via the same
# capability_map. That node also carries the volume-up rocker (KEY_VOLUMEUP); because the
# grab is exclusive, the map re-emits it on the keyboard target so volume up keeps working.
# (Gyro is still unavailable — no IIO/IMU on this build.)
version: 1
kind: CompositeDevice
name: Retroid Pocket 6 (RSInput)

# Always applicable on this device (single-target distro).
matches: []
single_source: false

source_devices:
  - group: gamepad
    evdev:
      phys_path: rsinput-gamepad/input0
      handler: event*
    capability_map_id: rp6_gamepad

  # Back paddles (+ volume-up rocker) live here, not on the gamepad node.
  - group: gamepad
    evdev:
      name: gpio-keys
      phys_path: gpio-keys/input0
      handler: event*
    capability_map_id: rp6_gamepad

options:
  auto_manage: true

target_devices:
  - deck
  - keyboard
