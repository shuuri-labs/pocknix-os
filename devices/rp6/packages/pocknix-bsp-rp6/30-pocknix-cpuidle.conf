# Disable cpu0 idle state1 — ported from ROCKNIX SM8550 quirk 096-cpuidle
# ("seems to cause GMU issues", i.e. the Adreno's GPU Management Unit).
# tmpfiles 'w' writes the value at every boot (systemd-tmpfiles-setup.service),
# so it re-asserts on each boot rather than depending on any session path.
w /sys/devices/system/cpu/cpu0/cpuidle/state1/disable - - - - 1
