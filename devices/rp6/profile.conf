# devices/rp6/profile.conf — build-time device profile: Retroid Pocket 6.
#
# One file answers every device-specific question the BUILD asks (the running
# OS asks /usr/lib/pocknix/device.conf, shipped by this device's BSP package).
# POSIX sh, sourced by scripts/lib.sh right after config/pocknix.conf; override
# any value from the environment as usual. Adding a device = adding a sibling
# directory with this file + a BSP package + a metapackage — no shared-file
# edits (see devices/README.md).

DEVICE_PRETTY="Retroid Pocket 6"
DEVICE_HOSTNAME="RP6"         # substituted for @DEVICENAME@ in the kernel config (CONFIG_DEFAULT_HOSTNAME)
: "${SOC:=sm8550}"            # selects kernel/${SOC}/ and vendor/rocknix-${SOC}/

# --- qcom-abl boot contract (what the stock bootloader expects) --------------
# GPT p1: FAT32, partition-name SD_BOOT_PARTNAME, FAT label SD_FAT_LABEL,
# containing KERNEL + KERNEL.md5. GPT p2: ext4, partition-name ROOT_LABEL.
: "${SD_FAT_LABEL:=ROCKNIX}"        # the RP6 ABL looks for this label; = ROCKNIX's DISTRO_BOOTLABEL
: "${SD_BOOT_PARTNAME:=system}"     # GPT name of the FAT boot partition (ROCKNIX uses "system")
: "${ROOT_LABEL:=POCKNIX_ROOT}"

# --- kernel command line ------------------------------------------------------
# Plain ext4 root, NO initramfs (UFS/SCSI/ext4 built-in), standard root= spec.
# The EXTRA params are ROCKNIX's SM8550 EXTRA_CMDLINE + RP6 quirks (usb interrupt
# override, UFS uic timeout, deep-only sleep).
: "${KERNEL_CMDLINE_ROOT:=root=PARTLABEL=${ROOT_LABEL} rw}"
: "${KERNEL_CMDLINE_EXTRA:=quiet rootwait console=tty0 allow_mismatched_32bit_el0 fw_devlink.strict=1 pcie_ports=compat irqaffinity=0-2 cgroup.memory=nokmem,nosocket nosoftlockup usbcore.interrupt_interval_override=045e:028e:2 ufshcd_core.uic_cmd_timeout=3000 mem_sleep_default=deep}"
: "${KERNEL_CMDLINE:=${KERNEL_CMDLINE_ROOT} ${KERNEL_CMDLINE_EXTRA}}"

# --- firmware source (within vendor/, populated by `make sync`) ---------------
: "${FW_SRC_REL:=rocknix-${SOC}/filesystem/usr/lib/kernel-overlays/base/lib/firmware}"

# --- device packages (built from devices/rp6/packages/, installed by build-image)
: "${DEVICE_BSP_PKG:=pocknix-bsp-rp6}"
: "${DEVICE_META_PKG:=pocknix-device-rp6}"
: "${KERNEL_PKG:=linux-pocknix-${SOC}}"
