# kernel/sm8550/kernel.conf — per-SoC kernel source pins. POSIX sh, sourced by
# scripts/lib.sh after the device profile (which sets SOC and thereby selects
# this file). Bumping this SoC's kernel never touches another SoC's tree.
#
# Stock kernel.org source, pinned — same base ROCKNIX uses for SM8550
# (packages/linux/package.mk: PKG_VERSION/PKG_URL). The full kernel is this
# stock source + the patch stack under kernel/sm8550/patches/ (applied in
# numeric subdir order: 10-mainline -> 20-sm8550 -> 30-version) + the config.
: "${KERNEL_VERSION:=7.1.2}"
: "${KERNEL_SOURCE_URL:=https://www.kernel.org/pub/linux/kernel/v${KERNEL_VERSION%%.*}.x/linux-${KERNEL_VERSION}.tar.xz}"
: "${KERNEL_SOURCE_SHA256:=37198c93727be247c9fb5309bb86cd5e496c61e5322cd8c4eca9476bb0b5883f}"

# ROCKNIX's version-specific patch dir is still named "7.0" for the 7.1.x series
# (package.mk: PKG_PATCH_DIRS+=" 7.0") - not derivable from KERNEL_VERSION.
: "${ROCKNIX_VERSION_PATCH_DIR:=7.0}"

# The ROCKNIX device dir this tree is synced from (scripts/sync.sh):
# ${ROCKNIX_PROJECT_DIR}/devices/${ROCKNIX_SOC}. ROCKNIX names its device dirs
# in uppercase; our SOC key is lowercase (it names kernel/<soc>/ and
# vendor/rocknix-<soc>/).
: "${ROCKNIX_SOC:=SM8550}"
